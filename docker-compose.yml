version: "3.9"

services:
  app:
    build: .
    container_name: drawspace_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/drawspace
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET:-supersecret_change_me}
      - CAPTCHA_SECRET=${CAPTCHA_SECRET:-test_captcha_secret}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend
    networks:
      - drawspace_net

  mongo:
    image: mongo:7
    container_name: drawspace_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drawspace_net

  redis:
    image: redis:7-alpine
    container_name: drawspace_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - drawspace_net

volumes:
  mongo_data:
  redis_data:

networks:
  drawspace_net:
    driver: bridge
