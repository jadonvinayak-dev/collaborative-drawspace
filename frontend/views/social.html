<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social — DrawSpace</title>
  <link rel="stylesheet" href="/css/global.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px; border-bottom: 1px solid var(--border);
    }
    .logo { font-family: var(--font-display); font-weight: 700; font-size: 17px; }
    .logo span { color: var(--accent); }
    .back-btn { font-size: 13px; color: var(--muted); margin-left: auto; }

    .layout { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto;
      padding: 20px;
    }
    .search-box { margin-bottom: 18px; }
    .section-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 16px 0 8px;
    }
    .user-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px; border-radius: 8px;
      transition: background .15s; cursor: pointer;
    }
    .user-row:hover { background: var(--surface); }
    .user-row.active { background: var(--accent); color: #fff; }
    .ur-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 13px; font-family: var(--font-display);
      flex-shrink: 0;
    }
    .ur-name { font-size: 14px; font-weight: 500; flex: 1; }
    .ur-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; background: transparent;
    }
    .icon-btn:hover { background: rgba(0,0,0,.08); }

    .chat-area { display: flex; flex-direction: column; }
    .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-weight: 600; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
    .msg {
      max-width: 60%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4;
    }
    .msg.mine { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg.theirs { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
    .chat-input-row {
      display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border);
    }
    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; flex-direction: column; gap: 8px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">Draw<span>Space</span></div>
    <a href="/dashboard" class="back-btn">← Dashboard</a>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search users…" oninput="searchUsers()" />
      </div>
      <div id="searchResults"></div>

      <div id="requestsSection" style="display:none">
        <div class="section-title">Friend requests</div>
        <div id="requestsList"></div>
      </div>

      <div class="section-title">Friends</div>
      <div id="friendsList"></div>

      <div id="blockedSection" style="display:none">
        <div class="section-title" style="color:var(--accent2);">Blocked</div>
        <div id="blockedList"></div>
      </div>
    </aside>

    <main class="chat-area" id="chatArea">
      <div class="empty-state">
        <div style="font-size:32px;">💬</div>
        <p>Select a friend to start chatting</p>
      </div>
    </main>
  </div>

  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/social.js"></script>
</body>
</html>
